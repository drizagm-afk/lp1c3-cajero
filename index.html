<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="content">
        <h1>Cajero Automatico</h1>
        <div id="container">
            <div>
                <p id="saldo"></p>
            </div>
            <div>
                <p>Ingresa un monto:</p>
                <input id="input" type="text" placeholder="Monto ($)">
                <div id="buttons">
                    <button onclick="depositar()">Depositar</button>
                    <button onclick="retirar()">Retirar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
